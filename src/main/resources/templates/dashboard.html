<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>首页 - 宣传协同平台</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: topbar}"></div>
<main class="container">
    <div class="page-title">
        <div>
            <div class="eyebrow">工作台</div>
            <h1>宣传流程总览</h1>
            <p>集中查看需求、任务、成果和归档进展。</p>
        </div>
        <a th:if="${currentUser.role == 'applicant'}" class="button" th:href="@{/requests/new}">提交宣传需求</a>
    </div>
    <div class="grid grid-3">
        <section class="card">
            <div class="metric-label">宣传需求数</div>
            <div class="metric" th:text="${stats.requestCount}">0</div>
        </section>
        <section class="card">
            <div class="metric-label">任务完成率</div>
            <div class="metric" th:text="${#numbers.formatDecimal(stats.completionRate, 1, 1)} + '%'">0%</div>
        </section>
        <section class="card">
            <div class="metric-label">归档素材数</div>
            <div class="metric" th:text="${stats.archivedAssetCount}">0</div>
        </section>
    </div>
    <section class="panel" style="margin-top:16px;">
        <div class="section-heading">
            <h2>近期任务</h2>
            <span class="muted">按当前角色展示可处理任务</span>
        </div>
        <table>
            <thead>
            <tr>
                <th>活动</th>
                <th>任务类型</th>
                <th>部门/干事</th>
                <th>状态</th>
                <th>截止时间</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.activityName}">活动</td>
                <td th:text="${task.typeName}">类型</td>
                <td>
                    <span th:text="${task.departmentName ?: '未派部门'}"></span>
                    <span th:if="${task.assigneeName != null}" th:text="' / ' + ${task.assigneeName}"></span>
                </td>
                <td><span th:class="${'badge ' + @ui.statusClass(task.taskStatus)}" th:text="${@ui.status(task.taskStatus)}">状态</span></td>
                <td th:text="${#temporals.format(task.deadline, 'yyyy-MM-dd HH:mm')}">时间</td>
            </tr>
            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="5" class="muted">暂无任务</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
